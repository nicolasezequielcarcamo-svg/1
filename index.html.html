<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre de Petróleo — Nicolás Carcamo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0f1a; overflow: hidden; font-family: 'Courier New', monospace; }
  #canvas { display: block; width: 100vw; height: 100vh; }
  #ui {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: #7dd3fc; font-size: 13px; text-align: center;
    background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px;
    border: 1px solid rgba(125,211,252,0.3); pointer-events: none;
    letter-spacing: 1px;
  }
  #vr-btn {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #1d4ed8; color: white; border: none; padding: 14px 36px;
    border-radius: 40px; font-size: 15px; cursor: pointer;
    font-family: 'Courier New', monospace; letter-spacing: 2px;
    box-shadow: 0 0 20px rgba(29,78,216,0.5);
    transition: all 0.2s;
  }
  #vr-btn:hover { background: #2563eb; box-shadow: 0 0 30px rgba(37,99,235,0.7); }
  #vr-btn.hidden { display: none; }
  #info {
    position: fixed; bottom: 30px; right: 20px;
    color: rgba(255,255,255,0.4); font-size: 11px; text-align: right;
    line-height: 1.8; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">🛢 TORRE DE PERFORACIÓN O&G · MODO 3D</div>
<button id="vr-btn">▶ ENTRAR EN VR (QUEST 3)</button>
<div id="info">CLICK + DRAG — Rotar<br>SCROLL — Zoom<br>TOUCH — Girar</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────
// SCENE SETUP
// ─────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.xr.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0f1a);
scene.fog = new THREE.Fog(0x0a0f1a, 40, 120);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(18, 8, 18);
camera.lookAt(0, 8, 0);

// ─────────────────────────────────────────
// MATERIALS
// ─────────────────────────────────────────
const mat = {
  steel: new THREE.MeshStandardMaterial({ color: 0x8a9ab5, roughness: 0.5, metalness: 0.85 }),
  steelDark: new THREE.MeshStandardMaterial({ color: 0x4a5568, roughness: 0.6, metalness: 0.8 }),
  steelRust: new THREE.MeshStandardMaterial({ color: 0x7c4a2d, roughness: 0.8, metalness: 0.5 }),
  ground: new THREE.MeshStandardMaterial({ color: 0x2d3748, roughness: 0.95, metalness: 0.0 }),
  concrete: new THREE.MeshStandardMaterial({ color: 0x718096, roughness: 0.9, metalness: 0.05 }),
  pipe: new THREE.MeshStandardMaterial({ color: 0x9aa5b4, roughness: 0.4, metalness: 0.9 }),
  tank: new THREE.MeshStandardMaterial({ color: 0xb7c3d0, roughness: 0.5, metalness: 0.7 }),
  tankRed: new THREE.MeshStandardMaterial({ color: 0x9b2335, roughness: 0.5, metalness: 0.6 }),
  yellow: new THREE.MeshStandardMaterial({ color: 0xd69e2e, roughness: 0.6, metalness: 0.3 }),
  black: new THREE.MeshStandardMaterial({ color: 0x1a202c, roughness: 0.8, metalness: 0.2 }),
  glow: new THREE.MeshStandardMaterial({ color: 0xff6b35, emissive: 0xff4500, emissiveIntensity: 0.8, roughness: 0.3, metalness: 0.1 }),
  light_glow: new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffd700, emissiveIntensity: 1.0 }),
};

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function box(w, h, d, mat, x=0, y=0, z=0, rx=0, ry=0, rz=0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  m.rotation.set(rx, ry, rz);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}
function cyl(rt, rb, h, seg, mat, x=0, y=0, z=0, rx=0, ry=0) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
  m.position.set(x, y, z); m.rotation.set(rx, ry, 0);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}
function ring(outerR, innerR, h, mat, x=0, y=0, z=0) {
  const shape = new THREE.Shape();
  shape.absarc(0,0,outerR,0,Math.PI*2,false);
  const hole = new THREE.Path();
  hole.absarc(0,0,innerR,0,Math.PI*2,true);
  shape.holes.push(hole);
  const geo = new THREE.ExtrudeGeometry(shape, { depth: h, bevelEnabled: false });
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI/2;
  m.position.set(x, y, z);
  m.castShadow = true;
  scene.add(m); return m;
}

// ─────────────────────────────────────────
// GROUND & BASE PLATFORM
// ─────────────────────────────────────────
// Ground
const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), mat.ground);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Grid lines on ground
const gridHelper = new THREE.GridHelper(80, 40, 0x1a2744, 0x1a2744);
scene.add(gridHelper);

// Main concrete base platform
box(12, 0.4, 12, mat.concrete, 0, 0.2, 0);

// Drillfloor platform (elevated)
box(8, 0.5, 8, mat.steelDark, 0, 3.25, 0);

// Sub-structure legs (4 corner legs of substructure)
const subLegs = [[-3,1.6,-3],[3,1.6,-3],[-3,1.6,3],[3,1.6,3]];
subLegs.forEach(([x,y,z]) => {
  box(0.35, 3.3, 0.35, mat.steel, x, y, z);
});

// Substructure cross braces
[[-3,2,0],[3,2,0],[0,2,-3],[0,2,3]].forEach(([x,y,z], i) => {
  const isZ = i < 2;
  box(isZ ? 0.12 : 6, 0.12, isZ ? 6 : 0.12, mat.steelDark, x, y, z);
});
box(0.12, 0.12, 6*1.414, mat.steelDark, -3, 1, 0, 0, 0, Math.PI/4);

// ─────────────────────────────────────────
// DERRICK MAST (main tower)
// ─────────────────────────────────────────
const H = 22; // tower height
const BASE = 3.5;
const TOP = 0.5;

// 4 main legs of derrick, tapering
function derrickLeg(startX, startZ, endX, endZ) {
  const numSeg = 12;
  for (let i = 0; i < numSeg; i++) {
    const t0 = i / numSeg;
    const t1 = (i + 1) / numSeg;
    const x0 = startX + (endX - startX) * t0;
    const z0 = startZ + (endZ - startZ) * t0;
    const x1 = startX + (endX - startX) * t1;
    const z1 = startZ + (endZ - startZ) * t1;
    const y0 = 3.5 + t0 * H;
    const y1 = 3.5 + t1 * H;
    const cx = (x0+x1)/2, cy = (y0+y1)/2, cz = (z0+z1)/2;
    const dx = x1-x0, dy = y1-y0, dz = z1-z0;
    const len = Math.sqrt(dx*dx+dy*dy+dz*dz);
    const m = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, len, 6), mat.steel);
    m.position.set(cx, cy, cz);
    // orient along direction
    const axis = new THREE.Vector3(dx/len, dy/len, dz/len);
    m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), axis);
    m.castShadow = true;
    scene.add(m);
  }
}

derrickLeg(-BASE, -BASE, -TOP, -TOP);
derrickLeg( BASE, -BASE,  TOP, -TOP);
derrickLeg(-BASE,  BASE, -TOP,  TOP);
derrickLeg( BASE,  BASE,  TOP,  TOP);

// Horizontal cross members every 3m
for (let y = 3.5; y < 3.5 + H; y += 2.5) {
  const t = (y - 3.5) / H;
  const half = BASE - (BASE - TOP) * t;
  // 4 horizontal bars
  box(half*2, 0.08, 0.08, mat.steelDark, 0, y, -half);
  box(half*2, 0.08, 0.08, mat.steelDark, 0, y,  half);
  box(0.08, 0.08, half*2, mat.steelDark, -half, y, 0);
  box(0.08, 0.08, half*2, mat.steelDark,  half, y, 0);
  // diagonal braces on each face
  const diagLen = Math.sqrt((half*2)**2 + 2.5**2);
  if (y + 2.5 < 3.5 + H) {
    const nt = (y + 2.5 - 3.5) / H;
    const nhalf = BASE - (BASE - TOP) * nt;
    // front/back braces
    [-half, half].forEach(zPos => {
      const geo = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, diagLen, 5), mat.steelDark);
      geo.position.set(0, y + 1.25, zPos);
      const angle = Math.atan2(nhalf - half, 2.5);
      geo.rotation.z = Math.PI/2 - angle * 0.3;
      scene.add(geo);
    });
  }
}

// Crown block at top
box(TOP*2+0.3, 0.4, TOP*2+0.3, mat.steel, 0, 3.5+H+0.2, 0);
box(TOP*2, 0.15, TOP*2, mat.steelDark, 0, 3.5+H+0.55, 0);

// Traveling block / hook
cyl(0.25, 0.25, 1.2, 8, mat.steelRust, 0, 3.5+H*0.55, 0);
cyl(0.08, 0.08, H*0.45, 8, mat.pipe, 0, 3.5+H*0.77, 0); // deadline

// ─────────────────────────────────────────
// CROWN WORK PLATFORM
// ─────────────────────────────────────────
box(TOP*3, 0.12, TOP*3, mat.steelDark, 0, 3.5+H-0.5, 0);

// ─────────────────────────────────────────
// MONKEY BOARD (mid-tower platform)
// ─────────────────────────────────────────
const mbH = 3.5 + H * 0.6;
box(2.5, 0.12, 1.2, mat.steelDark, -1.5, mbH, 0);
// railings
box(0.06, 1.0, 1.2, mat.steel, -2.7, mbH+0.5, 0);
box(0.06, 1.0, 1.2, mat.steel, -0.3, mbH+0.5, 0);
box(2.5, 0.06, 0.06, mat.steel, -1.5, mbH+1.0, 0.6);
box(2.5, 0.06, 0.06, mat.steel, -1.5, mbH+1.0, -0.6);

// ─────────────────────────────────────────
// DRAWWORKS CONSOLE (rig floor)
// ─────────────────────────────────────────
box(2.2, 1.2, 1.5, mat.steelDark, 2.5, 4.4, 0);
box(2.0, 0.08, 1.3, mat.steel, 2.5, 5.1, 0); // top panel
// control panel buttons (decorative)
for(let i=0;i<3;i++) for(let j=0;j<2;j++) {
  box(0.12, 0.12, 0.05, i===1&&j===0 ? mat.glow : mat.steelDark, 2.1+i*0.4, 4.6+j*0.25, -0.7);
}

// ─────────────────────────────────────────
// ROTARY TABLE
// ─────────────────────────────────────────
cyl(0.7, 0.7, 0.2, 16, mat.steel, 0, 3.6, 0);
cyl(0.2, 0.2, 0.5, 8, mat.steelDark, 0, 3.85, 0); // kelly

// ─────────────────────────────────────────
// MUD PUMPS
// ─────────────────────────────────────────
[-5.5, -5.5].forEach((x, i) => {
  const z = i===0 ? -2 : 2;
  box(2.5, 1.2, 1.2, mat.steelDark, x, 0.85, z);
  cyl(0.25, 0.25, 2.2, 8, mat.pipe, x+0.5, 1.5, z, Math.PI/2);
  cyl(0.12, 0.12, 1.8, 8, mat.pipe, x-0.3, 2.6, z, Math.PI/2);
});

// ─────────────────────────────────────────
// STORAGE TANKS (3 cylindrical)
// ─────────────────────────────────────────
[[-8,0,-5],[-8,0,0],[-8,0,5]].forEach(([x,y,z],i) => {
  cyl(1.2, 1.2, 3.5, 16, i===0 ? mat.tankRed : mat.tank, x, 2.25, z);
  cyl(1.25, 1.25, 0.15, 16, mat.steelDark, x, 4.1, z); // top rim
  cyl(1.25, 1.25, 0.15, 16, mat.steelDark, x, 0.45, z); // bottom rim
  // ladder on tank
  for(let j=0;j<6;j++) {
    box(0.06, 0.06, 0.8, mat.steel, x+1.25, 0.6+j*0.55, z);
  }
});

// Tank connecting pipes
box(0.12, 0.12, 10.5, mat.pipe, -8, 1.2, 0);
box(4.5, 0.12, 0.12, mat.pipe, -5.75, 1.2, 0);

// ─────────────────────────────────────────
// PIPE RACK (drill pipes stored)
// ─────────────────────────────────────────
box(0.2, 0.5, 8, mat.steel, 5.5, 0.45, 0); // rack support
box(0.2, 0.5, 8, mat.steel, 6.5, 0.45, 0);
for(let i=0;i<5;i++) {
  cyl(0.12, 0.12, 8, 8, mat.pipe, 6.0, 0.9+i*0.28, 0, 0, Math.PI/2);
}

// ─────────────────────────────────────────
// SHALE SHAKERS
// ─────────────────────────────────────────
box(2.5, 0.8, 1.5, mat.steelDark, 3.5, 0.65, -4);
box(2.4, 0.05, 1.4, mat.yellow, 3.5, 1.1, -4); // shaker screen

// ─────────────────────────────────────────
// GENERATOR UNIT
// ─────────────────────────────────────────
box(3.5, 1.8, 1.8, mat.black, -3.5, 1.15, -5.5);
box(3.4, 0.15, 1.7, mat.steelDark, -3.5, 2.12, -5.5);
cyl(0.2, 0.25, 1.5, 8, mat.steelDark, -2.5, 2.75, -5.5); // exhaust stack
cyl(0.08, 0.08, 0.4, 6, mat.glow, -2.5, 3.65, -5.5); // exhaust glow

// ─────────────────────────────────────────
// FLARE STACK
// ─────────────────────────────────────────
cyl(0.18, 0.22, 14, 8, mat.steel, 9, 7.5, -7);
cyl(0.25, 0.15, 0.8, 8, mat.steelRust, 9, 14.7, -7);
// Flare flame effect
const flameMat = new THREE.MeshStandardMaterial({
  color: 0xff6b35, emissive: 0xff4500, emissiveIntensity: 2.0,
  transparent: true, opacity: 0.85
});
cyl(0.15, 0.05, 0.9, 6, flameMat, 9, 15.5, -7);
// Stay wires for flare
[[0,0],[5,0],[0,5]].forEach(([dx,dz]) => {
  const sx=9, sz=-7, ex=sx+dx, ez=sz+dz;
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(sx, 14, sz),
    new THREE.Vector3(ex, 0.3, ez)
  ]);
  const wire = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x4a5568 }));
  scene.add(wire);
});

// ─────────────────────────────────────────
// SAFETY FENCING
// ─────────────────────────────────────────
const fencePositions = [
  [-6,0,-6],[  0,0,-6],[  6,0,-6],
  [-6,0, 6],[  0,0, 6],[  6,0, 6],
  [-6,0,  0],[  6,0,  0],
];
fencePositions.forEach(([x,y,z]) => {
  cyl(0.05, 0.05, 1.2, 6, mat.yellow, x, 0.9, z);
});
// Fence rails
for(let z=-6;z<=6;z+=6) {
  box(12.1, 0.04, 0.04, mat.yellow, 0, 0.6, z);
  box(12.1, 0.04, 0.04, mat.yellow, 0, 1.3, z);
}
box(0.04, 0.04, 12.1, mat.yellow, -6, 0.6, 0);
box(0.04, 0.04, 12.1, mat.yellow, 6, 0.6, 0);
box(0.04, 0.04, 12.1, mat.yellow, -6, 1.3, 0);
box(0.04, 0.04, 12.1, mat.yellow, 6, 1.3, 0);

// ─────────────────────────────────────────
// WORK LIGHTS on tower
// ─────────────────────────────────────────
[[BASE-0.3, 3.5+H*0.25, BASE-0.3],[-(BASE-0.3), 3.5+H*0.5, BASE-0.3]].forEach(([x,y,z],i) => {
  box(0.2, 0.2, 0.1, mat.light_glow, x, y, z);
  const pl = new THREE.PointLight(0xffd700, 0.8, 10);
  pl.position.set(x, y, z);
  scene.add(pl);
});

// ─────────────────────────────────────────
// STAIRS TO RIG FLOOR
// ─────────────────────────────────────────
for(let i=0;i<7;i++) {
  box(1.0, 0.08, 0.55, mat.steel, 4.2, 0.45+i*0.43, -1.2+i*0.3);
}
// Handrail
box(0.06, 3.2, 0.06, mat.steel, 4.7, 1.85, 0.6);
box(0.06, 3.2, 0.06, mat.steel, 3.7, 1.85, 0.6);
box(1.06, 0.06, 0.06, mat.steel, 4.2, 3.35, 0.6);

// ─────────────────────────────────────────
// LIGHTING SETUP
// ─────────────────────────────────────────
// Ambient
scene.add(new THREE.AmbientLight(0x1a2744, 0.8));

// Main sun (off angle, like dawn)
const sun = new THREE.DirectionalLight(0xfff0cc, 1.5);
sun.position.set(30, 40, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 120;
sun.shadow.camera.left = -30;
sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30;
sun.shadow.camera.bottom = -30;
scene.add(sun);

// Fill light (blue sky)
const fill = new THREE.DirectionalLight(0x4a90d9, 0.4);
fill.position.set(-20, 15, -20);
scene.add(fill);

// Flare light
const flareLight = new THREE.PointLight(0xff4500, 2.0, 25);
flareLight.position.set(9, 15.5, -7);
scene.add(flareLight);

// Generator glow
const genLight = new THREE.PointLight(0xff8c00, 0.6, 6);
genLight.position.set(-2.5, 3.5, -5.5);
scene.add(genLight);

// Hemisphere
scene.add(new THREE.HemisphereLight(0x1a3a6e, 0x0a0f1a, 0.5));

// Stars in background
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for(let i=0; i<2000; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 90 + Math.random() * 10;
  starVerts.push(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, sizeAttenuation: true }));
scene.add(stars);

// ─────────────────────────────────────────
// ORBIT CONTROLS (manual)
// ─────────────────────────────────────────
let isDragging = false, lastX = 0, lastY = 0;
let theta = Math.PI/4, phi = Math.PI/6, radius = 28, target = new THREE.Vector3(0, 8, 0);

function updateCamera() {
  camera.position.x = target.x + radius * Math.sin(phi) * Math.sin(theta);
  camera.position.y = target.y + radius * Math.cos(phi);
  camera.position.z = target.z + radius * Math.sin(phi) * Math.cos(theta);
  camera.lookAt(target);
}
updateCamera();

canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  theta -= (e.clientX - lastX) * 0.005;
  phi = Math.max(0.1, Math.min(Math.PI/2.2, phi + (e.clientY - lastY) * 0.004));
  lastX = e.clientX; lastY = e.clientY;
  updateCamera();
});
canvas.addEventListener('wheel', e => {
  radius = Math.max(5, Math.min(60, radius + e.deltaY * 0.04));
  updateCamera();
});

// Touch
let lastTouchX = 0, lastTouchY = 0;
canvas.addEventListener('touchstart', e => { lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  theta -= (e.touches[0].clientX - lastTouchX) * 0.005;
  phi = Math.max(0.1, Math.min(Math.PI/2.2, phi + (e.touches[0].clientY - lastTouchY) * 0.004));
  lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
  updateCamera();
}, { passive: false });

// ─────────────────────────────────────────
// WEBXR SETUP
// ─────────────────────────────────────────
const vrBtn = document.getElementById('vr-btn');

if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (supported) {
      vrBtn.classList.remove('hidden');
      vrBtn.addEventListener('click', async () => {
        const session = await navigator.xr.requestSession('immersive-vr', {
          requiredFeatures: ['local-floor'],
          optionalFeatures: ['hand-tracking']
        });
        renderer.xr.setSession(session);
        // In VR, reposition camera to standing position looking at tower
        renderer.xr.addEventListener('sessionstart', () => {
          renderer.xr.getCamera().position.set(0, 1.6, 12);
        });
      });
    } else {
      vrBtn.textContent = '⚠ VR NO DISPONIBLE EN ESTE DISPOSITIVO';
      vrBtn.style.background = '#4a5568';
    }
  });
} else {
  vrBtn.textContent = '⚠ WEBXR NO SOPORTADO · USÁ META BROWSER';
  vrBtn.style.background = '#4a5568';
}

// ─────────────────────────────────────────
// ANIMATION LOOP
// ─────────────────────────────────────────
let t = 0;
renderer.setAnimationLoop(() => {
  t += 0.016;
  // Flare flicker
  flareLight.intensity = 1.8 + Math.sin(t * 8) * 0.4 + Math.random() * 0.3;
  flameMat.emissiveIntensity = 1.8 + Math.sin(t * 12) * 0.5;
  // Gentle star rotation
  stars.rotation.y = t * 0.0002;

  renderer.render(scene, camera);
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
